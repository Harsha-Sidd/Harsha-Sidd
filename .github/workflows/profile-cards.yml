name: Update README Cards

on:
  schedule:
    - cron: "0 0 * * *"   # daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=Harsha-Sidd&show_icons=true&theme=nord&hide_border=true&title_color=FF3B30&icon_color=FF3B30"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=Harsha-Sidd&layout=compact&theme=nord&hide_border=true&title_color=FF3B30"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate xtassy pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: "username=Harsha-Sidd&repo=xtassy&theme=nord&hide_border=true&title_color=FF3B30"
          path: profile/pin-xtassy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Pocket-IDE pin card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: "username=Harsha-Sidd&repo=Pocket-IDE&theme=nord&hide_border=true&title_color=FF3B30"
          path: profile/pin-pocket-ide.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README stat cards" || echo "No changes to commit"
          git push
